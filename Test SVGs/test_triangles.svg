<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Test: Triangles</title>

  <!-- Equilateral triangles -->
  <polygon points="100,170 200,10 300,170"  fill="#e63946" stroke="#1d1d1d" stroke-width="2"/>
  <polygon points="330,170 430,10 530,170"  fill="#457b9d" stroke="#1d1d1d" stroke-width="2"/>
  <polygon points="560,170 660,10 760,170"  fill="#2dc653" stroke="#1d1d1d" stroke-width="2"/>

  <!-- Right-angle triangles -->
  <polygon points="10,380 10,200 200,380"   fill="#f4a261" stroke="#1d1d1d" stroke-width="2"/>
  <polygon points="220,200 420,200 420,380" fill="#9b5de5" stroke="#1d1d1d" stroke-width="2"/>

  <!-- Isoceles triangle (tall) -->
  <polygon points="540,200 640,380 440,380" fill="#f72585" stroke="#1d1d1d" stroke-width="2"/>
  <!-- Isoceles triangle (wide) -->
  <polygon points="400,200 750,200 575,380" fill="#0077b6" stroke="#1d1d1d" stroke-width="2"/>

  <!-- Large, centered triangle -->
  <polygon points="400,400 80,760 720,760"  fill="#ffb703" stroke="#1d1d1d" stroke-width="3"/>

  <!-- Small scattered triangles -->
  <polygon points="30,430 80,530 130,430"  fill="#606c38" stroke="#1d1d1d" stroke-width="2"/>
  <polygon points="650,420 730,550 570,550" fill="#d62828" stroke="#1d1d1d" stroke-width="2"/>
  <polygon points="700,400 780,550 620,550" fill="#48cae4" stroke="#1d1d1d" stroke-width="2" fill-opacity="0.7"/>

  <!-- Outline-only triangle (complex path) -->
  <polygon points="200,560 380,680 20,680"  fill="none" stroke="#e63946" stroke-width="5"/>
</svg>
