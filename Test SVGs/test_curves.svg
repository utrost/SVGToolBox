<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Test: Curves &amp; Paths</title>

  <!-- Cubic Bezier paths -->
  <path d="M 10,100 C 100,10  300,190 400,100"  fill="none" stroke="#e63946" stroke-width="5"/>
  <path d="M 10,180 C 150,80  250,300 400,180"  fill="none" stroke="#457b9d" stroke-width="5"/>
  <path d="M 10,260 C 200,160 300,400 400,260"  fill="none" stroke="#2dc653" stroke-width="5"/>

  <!-- S-curve (smooth cubic bezier) -->
  <path d="M 420,50 S 600,0 700,100 S 800,200 680,280" fill="none" stroke="#f4a261" stroke-width="5"/>

  <!-- Quadratic Bezier -->
  <path d="M 10,350 Q 200,200 400,350" fill="none" stroke="#9b5de5" stroke-width="5"/>
  <path d="M 420,350 Q 600,200 780,350" fill="none" stroke="#f72585" stroke-width="5"/>

  <!-- Arcs (circular and elliptical) -->
  <path d="M 100,450 A 100,100 0 1 1 300,450" fill="none" stroke="#0077b6" stroke-width="5"/>
  <path d="M 350,450 A 80,40  0 0 1 550,450" fill="none" stroke="#d62828" stroke-width="5"/>
  <path d="M 600,400 A 100,60 30 0 0 760,500"  fill="none" stroke="#606c38" stroke-width="5"/>

  <!-- Closed filled bezier shape -->
  <path d="M 150,560 C 220,490 330,490 350,560 C 370,630 250,680 150,640 Z" fill="#ffb703" stroke="#1d1d1d" stroke-width="3"/>

  <!-- Complex winding path (star-like) -->
  <path d="M 500,560 L 530,640 L 620,620 L 560,680 L 590,760 L 500,720 L 410,760 L 440,680 L 380,620 L 470,640 Z"
        fill="#48cae4" stroke="#1d1d1d" stroke-width="3"/>

  <!-- Wavy line simulated with many bezier segments -->
  <path d="M 10,760 C 60,720 90,800 140,760 C 190,720 220,800 270,760 C 320,720 350,800 400,760 C 450,720 480,800 530,760 C 580,720 610,800 660,760 C 710,720 740,800 790,760"
        fill="none" stroke="#e63946" stroke-width="4"/>

  <!-- Spiral (approximated with arcs) -->
  <path d="M 680,620 A 10,10  0 1 0 680,600
           A 20,20  0 1 0 680,560
           A 40,40  0 1 0 680,480
           A 70,70  0 1 0 680,340"
        fill="none" stroke="#9b5de5" stroke-width="3" transform="translate(0, 120)"/>
</svg>
